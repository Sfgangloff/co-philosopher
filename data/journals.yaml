# data/journals.yaml
#
# Trusted list of English-language academic philosophy journals, consumed by
# the cophilo bibliography scorer (see PLAN.md §11).
#
# Provenance & honesty notes:
#   * Compiled from general knowledge of the field. Publisher author-guideline
#     pages were not machine-reachable from the build environment (all behind
#     bot protection), so figures were NOT scraped.
#   * `issn` is deliberately `null` throughout: an ISSN is only useful if exact,
#     and unverified ISSNs would be worse than none. Verify at the publisher.
#   * `typical_length` is prose guidance reflecting widely-known norms; it can
#     and does change. `max_words` is an integer ONLY where a hard cap is a
#     stable, well-documented community fact, else `null`. Always confirm the
#     current limit on the journal's submission page before relying on it.
#   * `sources: ["knowledge"]` everywhere, per the above.
#
# Many analytic generalist journals state no hard limit but expect research
# articles in the ~8,000–12,000 word range; shorter "discussion notes" are
# often capped near 3,000–4,000 words.
#
# ============================================================================
# TODO (manual, ongoing): enrich this file by hand.
#   - Fill in `max_words` per journal with the *actual* limit from each
#     journal's current author guidelines (most are still `null`).
#   - Tighten `typical_length` prose where a real figure is known.
#   - Add verified `issn` values (currently `null` everywhere by design).
#   - Add journals as gaps are noticed; flip `sources` to
#     "publisher-guidelines" for any field confirmed against the live page.
# Treat this as the standing issue for journal-metadata accuracy.
# ============================================================================

